- title: "Dishonouring Christ: A Facebook Conversation"
  description: >-
    A reproduced Facebook discussion prompted by an online debate over authority
    and conscience, unfolding into an exchange on what it means to dishonour
    Christ—drawing especially on Hebrews 10 and Protestant–Catholic differences
    over the Mass, mediation, and the sufficiency of Christ’s once-for-all work.
  slug: "dishonouring-christ-a-facebook-conversation"
  source: "Dishonouring Christ/Dishonouring Christ.md"
  type: "markdown"

