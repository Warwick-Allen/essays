# Essay manifest — the single source of truth for which essays appear on the site.
#
# Fields:
#   title       — display title on the index page
#   description — short blurb shown beneath the title
#   slug        — URL path segment (markdown → /slug/, html → /slug.html)
#   source      — path to the source file, relative to the repo root
#   type        — "markdown" (Jekyll-rendered) or "html" (pre-built, copied verbatim)

- title: "Theological Profile"
  description: >-
    A comprehensive theological profile presenting a Molinist Arminian Baptist
    Charismatic perspective with high sacramental convictions. This document
    provides a systematic overview of theological convictions organised by major
    doctrinal categories.
  slug: "theological-profile"
  source: "Theological Profile/warwick_allen_theological_profile.md"
  type: "markdown"

- title: "The Dominant Themes and Intersecting Motifs in the Book of Hebrews"
  description: >-
    An exploration of the six dominant themes in Hebrews—Christ's supremacy, the
    new covenant, Christ's priesthood, faith and perseverance, the call to
    holiness and worship, and the warning against rejecting Christ's sufficient
    atonement—unified by four interwoven motifs: rest, covenant fulfilment,
    access to God's presence, and perfection.
  slug: "themes-and-motifs-in-hebrews"
  source: "Themes and Motifs in Hebrews/themes_and_motifs_in_hebrews.html"
  type: "html"

