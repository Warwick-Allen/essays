- title: "The Dominant Themes and Intersecting Motifs in the Book of Hebrews"
  description: >-
    An exploration of the six dominant themes in Hebrews—Christ's supremacy, the
    new covenant, Christ's priesthood, faith and perseverance, the call to
    holiness and worship, and the warning against rejecting Christ's sufficient
    atonement—unified by four interwoven motifs: rest, covenant fulfilment,
    access to God's presence, and perfection.
  slug: "themes-and-motifs-in-hebrews"
  source: "Themes and Motifs in Hebrews/themes_and_motifs_in_hebrews.html"
  type: "html"
